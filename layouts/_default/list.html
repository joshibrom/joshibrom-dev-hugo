{{ define "main" }}
<header>
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p>{{ . }}</p>{{ end }}
</header>
<ul class="page-list">
  {{ range .Pages }}
  <li>
    <a href="{{ .Permalink }}">{{ .Title }}</a>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2006" }}</time>
    {{ with .Description }}<p>{{ . }}</p>{{ end }}
  </li>
  {{ end }}
</ul>
{{ end }}
